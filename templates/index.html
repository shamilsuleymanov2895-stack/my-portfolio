<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Портфолио | Копирайтинг, Разработка, Дизайн</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8f9fa; }
        .hero { background: #212529; color: white; padding: 60px 0; }
        .card { border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.05); transition: 0.3s; }
        .card:hover { transform: translateY(-5px); }
    </style>
</head>
<body>

<header class="hero text-center">
    <div class="container">
        <h1>Тексты. Код. Дизайн.</h1>
        <p class="lead">Профессиональные услуги копирайтинга и разработки</p>
    </div>
</header>

<div class="container my-5">
    <div class="row g-4">
        {% for srv in services %}
        <div class="col-md-6 col-lg-3">
            <div class="card h-100 p-4 text-center">
                <div class="mb-3 text-primary" style="font-size: 2rem;"><i class="bi {{ srv.icon }}"></i></div>
                <h5 class="fw-bold">{{ srv.title }}</h5>
                <p class="small text-muted">{{ srv.desc }}</p>
            </div>
        </div>
        {% endfor %}
    </div>

    <div class="row justify-content-center mt-5">
        <div class="col-md-6 bg-white p-5 rounded-4 shadow-sm">
            <h3 class="text-center mb-4">Оставить заявку</h3>
            <form action="/contact" method="POST">
                <div class="mb-3">
                    <input type="text" name="name" class="form-control" placeholder="Ваше имя" required>
                </div>
                <div class="mb-3">
                    <input type="text" name="contact" class="form-control" placeholder="Контакт (ТГ или почта)" required>
                </div>
                <div class="mb-3">
                    <textarea name="message" class="form-control" placeholder="Ваш вопрос" rows="3"></textarea>
                </div>
                <button type="submit" class="btn btn-dark w-100">Отправить</button>
            </form>
        </div>
    </div>
</div>

</body>
</html>
